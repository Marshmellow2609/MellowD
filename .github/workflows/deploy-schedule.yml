name: Scheduled Deployment

on:
  schedule:
    - cron: '15 3-14 * * 1-5' # Every 3 hours between 3:15 AM to 2 PM on weekdays

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        pytest tests/ > result.log
        echo "Test Results: $(cat result.log)"

    - name: Send deployment report
      run: |
        TIMESTAMP=$(date --utc +'%Y-%m-%dT%H:%M:%SZ')
        ANALYSIS="Deployment analysis results..."
        TEST_RESULTS="$(cat result.log)"
        curl -X POST https://cash.app/$propremondespc \
        -H "Content-Type: application/json" \
        -d "{\\"timestamp\\":\\"$TIMESTAMP\\", \\\"analysis\\":\\"$ANALYSIS\\", \\\"test_results\\":\\"$TEST_RESULTS\\"}"